<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500" fill="none">
  <rect width="400" height="500" fill="#1a0e0e"/>
  <rect x="1" y="1" width="398" height="498" rx="1" stroke="#2a1818" stroke-width="2"/>
  <!-- Perfume bottle silhouette -->
  <rect x="155" y="100" width="90" height="20" rx="4" fill="#2a1818"/>
  <rect x="165" y="90" width="70" height="15" rx="3" fill="#c9a96e" opacity="0.4"/>
  <rect x="140" y="120" width="120" height="200" rx="12" fill="#2a1818"/>
  <rect x="145" y="125" width="110" height="190" rx="10" fill="#1a0e0e" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Label area -->
  <rect x="155" y="185" width="90" height="70" rx="4" fill="#2a1818"/>
  <text x="200" y="215" font-family="Georgia, serif" font-size="11" fill="#c9a96e" text-anchor="middle" opacity="0.8">MATCH</text>
  <text x="200" y="230" font-family="Georgia, serif" font-size="7" fill="#9a8576" text-anchor="middle" letter-spacing="3">PERFUMES</text>
  <text x="200" y="248" font-family="Georgia, serif" font-size="7" fill="#9a8576" text-anchor="middle" opacity="0.6">50 ml</text>
  <!-- Decorative lines -->
  <line x1="160" y1="178" x2="240" y2="178" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="160" y1="262" x2="240" y2="262" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Bottom text -->
  <text x="200" y="450" font-family="Georgia, serif" font-size="12" fill="#9a8576" text-anchor="middle" opacity="0.5">Product Image</text>
</svg>
